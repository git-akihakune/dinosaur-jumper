<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Dinosaur Jumper</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #f7f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        touch-action: none;
      }
      canvas { display: block; }
      #chrome-overlay {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 10;
        padding: 40px 20px 20px;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #646464;
        pointer-events: none;
        transition: opacity 0.8s ease;
      }
      .chrome-icon { margin-bottom: 20px; }
      .chrome-dino-icon {
        display: inline-block;
        width: 60px;
        height: 50px;
        background: #535353;
        clip-path: polygon(
          30% 0%, 70% 0%, 70% 20%, 90% 20%, 90% 30%,
          100% 30%, 100% 60%, 80% 60%, 80% 80%, 60% 80%,
          60% 100%, 40% 100%, 40% 80%, 20% 80%, 20% 60%,
          0% 60%, 0% 40%, 20% 40%, 20% 20%, 30% 20%
        );
      }
      .chrome-title { font-size: 20px; font-weight: 500; color: #333; margin-bottom: 8px; }
      .chrome-message { font-size: 14px; margin-bottom: 4px; }
      .chrome-list { font-size: 13px; list-style: disc inside; margin-bottom: 16px; line-height: 1.6; }
      .chrome-error-code { font-size: 11px; color: #999; }
      @media (max-width: 600px) {
        #chrome-overlay { padding: 20px 16px 10px; }
        .chrome-title { font-size: 16px; }
        .chrome-list { font-size: 12px; }
        .chrome-dino-icon { width: 40px; height: 34px; }
      }
    </style>
  </head>
  <body>
    <div id="chrome-overlay">
      <div class="chrome-icon">
        <div class="chrome-dino-icon"></div>
      </div>
      <h1 class="chrome-title">No internet</h1>
      <p class="chrome-message">Try:</p>
      <ul class="chrome-list">
        <li>Checking the network cables, modem, and router</li>
        <li>Reconnecting to Wi-Fi</li>
      </ul>
      <p class="chrome-error-code">ERR_INTERNET_DISCONNECTED</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
